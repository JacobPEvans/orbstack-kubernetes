apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cribl-edge-standalone
  namespace: monitoring
  labels:
    app: cribl-edge-standalone
    app.kubernetes.io/name: cribl-edge-standalone
    app.kubernetes.io/component: edge-collector
spec:
  serviceName: cribl-edge-standalone
  replicas: 1
  selector:
    matchLabels:
      app: cribl-edge-standalone
  template:
    metadata:
      labels:
        app: cribl-edge-standalone
        app.kubernetes.io/name: cribl-edge-standalone
        app.kubernetes.io/component: edge-collector
    spec:
      priorityClassName: monitoring-high
      # runAsNonRoot omitted: container reads user-owned hostPath volumes
      # (PLACEHOLDER_HOME_DIR/.claude, logs) which require the host user's UID.
      containers:
        - name: cribl-edge
          image: cribl/cribl:latest
          ports:
            - name: otel
              containerPort: 9420
              protocol: TCP
            - name: ui
              containerPort: 9000
              protocol: TCP
          env:
            - name: CRIBL_DIST_MODE
              value: "edge"
            - name: CRIBL_VOLUME_DIR
              value: "/opt/cribl/data"
            - name: CRIBL_EDGE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cribl-edge-admin
                  key: password
                  optional: true
            - name: CLAUDE_HOME
              value: "/home/claude"
            - name: GEMINI_HOME
              value: "/home/gemini"
            - name: CRIBL_EDGE_API_HOST
              value: "0.0.0.0"
            - name: CRIBL_BEFORE_START_CMD_1
              value: >-
                mkdir -p ${CRIBL_VOLUME_DIR}/local/edge &&
                cp /var/tmp/cribl-config/outputs.yml
                ${CRIBL_VOLUME_DIR}/local/edge/outputs.yml
            - name: CRIBL_BEFORE_START_CMD_2
              value: |
                set -eu
                PACK_URL="https://github.com/JacobPEvans/cc-edge-claude-code-otel/releases/download/v2.0.0/cc-edge-claude-code-otel.crbl"
                PACK_FILE="/tmp/cc-edge-claude-code-otel.crbl"
                EDGE_DIR="${CRIBL_VOLUME_DIR}/local/edge"
                curl -sfL "${PACK_URL}" -o "${PACK_FILE}" || { echo "WARNING: Pack download failed"; exit 0; }
                tar --no-same-owner -xzf "${PACK_FILE}" -C /tmp default/inputs.yml default/pipelines/
                cp /tmp/default/inputs.yml "${EDGE_DIR}/inputs.yml"
                mkdir -p "${EDGE_DIR}/pipelines"
                cp -r /tmp/default/pipelines/* "${EDGE_DIR}/pipelines/"
                rm -rf /tmp/default "${PACK_FILE}"
                echo "Pack config installed successfully"
            - name: CRIBL_BEFORE_START_CMD_3
              value: |
                set -eu
                PACK_URL="https://github.com/JacobPEvans/cc-edge-gemini-antigravity-io/releases/download/v0.1.0/cc-edge-gemini-antigravity-io.crbl"
                PACK_FILE="/tmp/cc-edge-gemini-antigravity-io.crbl"
                EDGE_DIR="${CRIBL_VOLUME_DIR}/local/edge"
                curl -sfL "${PACK_URL}" -o "${PACK_FILE}" || { echo "WARNING: Gemini pack download failed"; exit 0; }
                tar --no-same-owner -xzf "${PACK_FILE}" -C /tmp default/inputs.yml
                echo "" >> "${EDGE_DIR}/inputs.yml"
                # Merge Gemini inputs: skip 'inputs:' header line and exclude gemini-cli-otel
                # (gemini-cli-otel conflicts with claude-code-otel which already handles OTEL on port 4317)
                tail -n +2 /tmp/default/inputs.yml | awk '/^  gemini-cli-otel:/{exit} {print}' >> "${EDGE_DIR}/inputs.yml"
                # Workaround for Cribl Edge 4.16.x manual mode bug: filenames patterns must start
                # with * or the FileMonitor silently never starts. session-*.json has * in the
                # middle which triggers the bug. Broaden to *.json so the monitor starts;
                # the Stream pipeline routes by source path for correct sourcetype assignment.
                sed -i 's/"session-\*\.json"/"*.json"/' "${EDGE_DIR}/inputs.yml"
                rm -rf /tmp/default "${PACK_FILE}"
                echo "Gemini pack inputs merged and patched successfully"
          volumeMounts:
            - name: claude-logs
              mountPath: /home/claude/.claude
              readOnly: true
            - name: ollama-logs
              mountPath: /var/log/ollama
              readOnly: true
            - name: terminal-logs
              mountPath: /var/log/terminal
              readOnly: true
            - name: ai-job-logs
              mountPath: /var/log/ai-jobs
              readOnly: true
            - name: gemini-config
              mountPath: /home/gemini/.gemini
              readOnly: true
            - name: antigravity-logs
              mountPath: "/home/gemini/Library/Application Support/Antigravity/logs"
              readOnly: true
            - name: cribl-config-templates
              mountPath: /var/tmp/cribl-config
              readOnly: true
            - name: cribl-data
              mountPath: /opt/cribl/data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "curl -sf http://127.0.0.1:9420/api/v1/health || exit 1"
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 90
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "curl -sf http://127.0.0.1:9420/api/v1/health || exit 1"
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "curl -sf http://127.0.0.1:9420/api/v1/health || exit 1"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
      volumes:
        - name: claude-logs
          hostPath:
            path: PLACEHOLDER_HOME_DIR/.claude
            type: DirectoryOrCreate
        - name: ollama-logs
          hostPath:
            path: PLACEHOLDER_HOME_DIR/Library/Logs/Ollama
            type: DirectoryOrCreate
        - name: terminal-logs
          hostPath:
            path: PLACEHOLDER_HOME_DIR/logs
            type: DirectoryOrCreate
        - name: ai-job-logs
          hostPath:
            path: PLACEHOLDER_HOME_DIR/logs/ai-jobs
            type: DirectoryOrCreate
        - name: gemini-config
          hostPath:
            path: PLACEHOLDER_HOME_DIR/.gemini
            type: DirectoryOrCreate
        - name: antigravity-logs
          hostPath:
            path: "PLACEHOLDER_HOME_DIR/Library/Application Support/Antigravity/logs"
            type: DirectoryOrCreate
        - name: cribl-config-templates
          configMap:
            name: cribl-edge-standalone-config
  volumeClaimTemplates:
    - metadata:
        name: cribl-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
