---
# Allow Bifrost AI Gateway to reach cloud AI providers (HTTPS)
# and local MLX inference server on macOS host (port 11434).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-bifrost-egress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: bifrost
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
    - ports:
        - port: 11434
          protocol: TCP
