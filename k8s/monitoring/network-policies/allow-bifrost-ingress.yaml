---
# Allow external access to Bifrost AI Gateway via NodePort :30080.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-bifrost-ingress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: bifrost
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
