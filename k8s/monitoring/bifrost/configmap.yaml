apiVersion: v1
kind: ConfigMap
metadata:
  name: bifrost-config
  namespace: monitoring
  labels:
    app: bifrost
  annotations:
    bifrost-timeouts/default_request_timeout_in_seconds: "60"
    bifrost-timeouts/max_request_timeout_in_seconds: "300"
data:
  config.json: |
    {
      "$schema": "https://www.getbifrost.ai/schema",
      "client": {
        "mcp_tool_execution_timeout": $(MAX_REQUEST_TIMEOUT_IN_SECONDS)
      },
      "providers": {
        "openai": {
          "keys": [
            {
              "name": "openai-primary",
              "value": "env.OPENAI_API_KEY",
              "models": [],
              "weight": 1.0
            }
          ],
          "network_config": {
            "default_request_timeout_in_seconds": $(DEFAULT_REQUEST_TIMEOUT_IN_SECONDS)
          }
        },
        "gemini": {
          "keys": [
            {
              "name": "gemini-primary",
              "value": "env.GEMINI_API_KEY",
              "models": [],
              "weight": 1.0
            }
          ],
          "network_config": {
            "default_request_timeout_in_seconds": $(DEFAULT_REQUEST_TIMEOUT_IN_SECONDS)
          }
        },
        "openrouter": {
          "keys": [
            {
              "name": "openrouter-primary",
              "value": "env.OPENROUTER_API_KEY",
              "models": [],
              "weight": 1.0
            }
          ],
          "network_config": {
            "default_request_timeout_in_seconds": $(DEFAULT_REQUEST_TIMEOUT_IN_SECONDS)
          }
        },
        "mlx-local": {
          "keys": [
            {
              "name": "mlx-key",
              "value": "not-needed",
              "models": [],
              "weight": 1.0
            }
          ],
          "network_config": {
            "base_url": "http://host.docker.internal:11434",
            "default_request_timeout_in_seconds": $(MAX_REQUEST_TIMEOUT_IN_SECONDS)
          },
          "custom_provider_config": {
            "base_provider_type": "openai",
            "allowed_requests": {
              "list_models": true,
              "chat_completion": true,
              "chat_completion_stream": true
            }
          }
        }
      }
    }
