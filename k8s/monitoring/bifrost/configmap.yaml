apiVersion: v1
kind: ConfigMap
metadata:
  name: bifrost-config
  namespace: monitoring
  labels:
    app: bifrost
data:
  config.json: |
    {
      "providers": {
        "openai": {
          "keys": [
            {
              "name": "openai-primary",
              "value": "env.OPENAI_API_KEY",
              "models": [],
              "weight": 1.0
            }
          ]
        },
        "gemini": {
          "keys": [
            {
              "name": "gemini-primary",
              "value": "env.GEMINI_API_KEY",
              "models": [],
              "weight": 1.0
            }
          ]
        },
        "openrouter": {
          "keys": [
            {
              "name": "openrouter-primary",
              "value": "env.OPENROUTER_API_KEY",
              "models": [],
              "weight": 1.0
            }
          ]
        },
        "mlx-local": {
          "keys": [
            {
              "name": "mlx-key",
              "value": "not-needed",
              "models": [],
              "weight": 1.0
            }
          ],
          "network_config": {
            "base_url": "http://host.docker.internal:11434",
            "default_request_timeout_in_seconds": 300
          },
          "custom_provider_config": {
            "base_provider_type": "openai",
            "allowed_requests": {
              "list_models": true,
              "chat_completion": true,
              "chat_completion_stream": true
            }
          }
        }
      }
    }
