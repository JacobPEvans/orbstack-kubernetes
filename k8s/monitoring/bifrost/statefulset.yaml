apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bifrost
  namespace: monitoring
  labels:
    app: bifrost
    app.kubernetes.io/name: bifrost
    app.kubernetes.io/component: ai-gateway
  annotations:
    secret.reloader.stakater.com/reload: "bifrost-provider-keys"
spec:
  serviceName: bifrost
  replicas: 1
  selector:
    matchLabels:
      app: bifrost
  template:
    metadata:
      labels:
        app: bifrost
        app.kubernetes.io/name: bifrost
        app.kubernetes.io/component: ai-gateway
    spec:
      priorityClassName: monitoring-low
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: seed-config
          image: busybox:1.37
          command: ["sh", "-c", "cp /config-ro/config.json /app/data/config.json"]
          volumeMounts:
            - name: config-ro
              mountPath: /config-ro
              readOnly: true
            - name: data
              mountPath: /app/data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      containers:
        - name: bifrost
          # renovate: datasource=docker depName=maximhq/bifrost
          image: maximhq/bifrost:v1.4.19
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
          env:
            - name: APP_PORT
              value: "8080"
            - name: LOG_LEVEL
              value: "info"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bifrost-provider-keys
                  key: OPENAI_API_KEY
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bifrost-provider-keys
                  key: GEMINI_API_KEY
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bifrost-provider-keys
                  key: OPENROUTER_API_KEY
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          resources:
            requests:
              memory: "256Mi"
              ephemeral-storage: "128Mi"
            limits:
              memory: "512Mi"
              ephemeral-storage: "1Gi"
          # Health-probe timings. All probes hit /health, which is a
          # lightweight DB-ping check that normally returns in ~10 ms.
          # Timing fields are multiples of 10 for readability;
          # timeoutSeconds provides generous headroom for transient
          # latency under concurrent load; failureThreshold is expressed
          # as a retry count rather than a raw time budget.
          # livenessProbe and readinessProbe omit initialDelaySeconds
          # because Kubernetes does not start them until the startupProbe
          # has succeeded — any initial delay there would be dead time.
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 6        # allow up to 6 failed startup checks
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            failureThreshold: 3        # 3 consecutive failures before restart
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 20
            failureThreshold: 3        # 3 consecutive failures before unready
            timeoutSeconds: 10
      volumes:
        - name: config-ro
          configMap:
            name: bifrost-config
        - name: data
          emptyDir:
            sizeLimit: 1Gi
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
