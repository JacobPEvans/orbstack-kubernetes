apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: bifrost-provider-keys
  namespace: doppler-operator-system
spec:
  tokenSecret:
    name: doppler-token-bifrost
  managedSecret:
    name: bifrost-provider-keys
    namespace: monitoring
    type: Opaque
  secrets:
    - OPENAI_API_KEY
    - ANTHROPIC_API_KEY
    - GEMINI_API_KEY
    - OPENROUTER_API_KEY
  resyncSeconds: 60
