apiVersion: v1
kind: LimitRange
metadata:
  name: cribl-cpu-defaults
  namespace: monitoring
  labels:
    app.kubernetes.io/component: cribl-defaults
  annotations:
    # CPU defaults for all Cribl containers in this namespace.
    # Containers that do NOT specify cpu in their resources block inherit these values.
    # Non-Cribl containers (otel-collector, heartbeats, etc.) set their own explicit
    # cpu values and are therefore unaffected by these defaults.
spec:
  limits:
    - type: Container
      default:
        cpu: "2"
      defaultRequest:
        cpu: "1000m"
