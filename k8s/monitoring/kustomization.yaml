apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - namespace.yaml
  - priority-classes.yaml
  - limitrange.yaml
  # OTEL Collector
  - otel-collector/
  # Cribl Edge (managed by Cribl Cloud)
  - cribl-edge-managed/
  # Cribl Edge (standalone)
  - cribl-edge-standalone/
  # Cribl Stream (standalone leader with UI)
  - cribl-stream-standalone/
  # Cribl MCP Server (Cribl Cloud API access for Claude Code)
  - cribl-mcp-server/
  # Bifrost AI Gateway (multi-provider AI routing for Claude Code)
  - bifrost/
  # Pipeline heartbeat CronJob (dead-man's switch)
  - pipeline-heartbeat/
  # Healthchecks.io heartbeat CronJobs
  - heartbeat-splunk/
  - heartbeat-edge/
  - heartbeat-otel/
  # Network policies
  - network-policies/

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: claude-monitoring
