# =============================================================================
# Pre-commit Configuration
# =============================================================================
# Foundation hooks for local development. Install with:
#   pip install pre-commit && pre-commit install --hook-type commit-msg --hook-type pre-push
#
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate
# =============================================================================

repos:
  # ---------------------------------------------------------------------------
  # Base hooks - standard file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
        name: Validate YAML syntax
        exclude: '^\.github/(aw/|workflows/(.*\.lock\.yml|agentics-maintenance\.yml))'
      - id: end-of-file-fixer
        name: Fix end-of-file newlines
        exclude: '^\.github/(aw/|workflows/(.*\.lock\.yml|agentics-maintenance\.yml))'
      - id: trailing-whitespace
        name: Trim trailing whitespace
        exclude: '^\.github/(aw/|workflows/(.*\.lock\.yml|agentics-maintenance\.yml))'
      - id: check-case-conflict
        name: Check for case conflicts
      - id: check-merge-conflict
        name: Check for merge conflict markers
      - id: mixed-line-ending
        name: Normalize line endings
        args: [--fix=lf]
      - id: check-added-large-files
        name: Check for large files

  # ---------------------------------------------------------------------------
  # Python linting and formatting
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        name: Lint Python (ruff)
        args: [--fix]
      - id: ruff-format
        name: Format Python (ruff)

  # ---------------------------------------------------------------------------
  # Shell script linting
  # ---------------------------------------------------------------------------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: Lint shell scripts

  # ---------------------------------------------------------------------------
  # Markdown linting
  # ---------------------------------------------------------------------------
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
      - id: markdownlint-cli2
        name: Lint markdown files
        exclude: '^\.github/aw/'

  # ---------------------------------------------------------------------------
  # Spell checking
  # ---------------------------------------------------------------------------
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v9.6.0
    hooks:
      - id: cspell
        name: Check spelling
        additional_dependencies:
          - "@cspell/dict-aws@4.0.17"
          - "@cspell/dict-bash@4.2.2"
          - "@cspell/dict-companies@3.2.11"
          - "@cspell/dict-data-science@2.0.13"
          - "@cspell/dict-docker@1.1.17"
          - "@cspell/dict-filetypes@3.0.18"
          - "@cspell/dict-git@3.1.0"
          - "@cspell/dict-html@4.0.15"
          - "@cspell/dict-k8s@1.0.12"
          - "@cspell/dict-markdown@2.0.16"
          - "@cspell/dict-node@5.0.9"
          - "@cspell/dict-npm@5.2.38"
          - "@cspell/dict-python@4.2.26"
          - "@cspell/dict-shell@1.1.2"
          - "@cspell/dict-software-terms@5.2.2"
          - "@cspell/dict-terraform@1.1.3"
          - "@cspell/dict-typescript@3.2.3"

  # ---------------------------------------------------------------------------
  # YAML linting
  # ---------------------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: Lint YAML files
        args: [-c, .yamllint.yml]
        files: '\.(yaml|yml)$'
        exclude: '^\.github/(aw/|workflows/(.*\.lock\.yml|agentics-maintenance\.yml))'

  # ---------------------------------------------------------------------------
  # Link checking
  # ---------------------------------------------------------------------------
  - repo: https://github.com/tcort/markdown-link-check
    rev: v3.14.2
    hooks:
      - id: markdown-link-check
        name: Check markdown links
        args: [--config, .markdown-link-check.json]

  # ---------------------------------------------------------------------------
  # Kustomize validation
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: kustomize-build
        name: Validate kustomize builds
        entry: bash -c 'set -e; for dir in k8s/monitoring k8s/sandbox; do kubectl kustomize "$dir" > /dev/null; done'
        language: system
        pass_filenames: false
        files: ^k8s/(monitoring|sandbox)/.*\.yaml$

  # ---------------------------------------------------------------------------
  # Kubernetes schema validation
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: kubeconform
        name: Validate Kubernetes schemas
        entry: >-
          bash -c 'set -e; set -o pipefail;
          for dir in k8s/monitoring k8s/sandbox; do
          kubectl kustomize "$dir" | kubeconform -strict -summary -output text; done'
        language: system
        pass_filenames: false
        files: ^k8s/(monitoring|sandbox)/.*\.yaml$

  # ---------------------------------------------------------------------------
  # Commit message validation (commit-msg stage)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        name: Validate commit message format
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional@20.4.1"]

  - repo: https://github.com/commit-check/commit-check
    rev: v2.4.1
    hooks:
      - id: check-branch
        name: Check branch naming conventions
        stages: [pre-push]

  # ---------------------------------------------------------------------------
  # Security: no real IP addresses
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: no-real-ips
        name: Check for real IP addresses
        entry: >-
          bash -c 'matches=$(grep -rEn "[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}"
          --include="*.yaml" --include="*.sh" k8s/ scripts/ docker/ 2>/dev/null
          | grep -vE "(192\.168\.|127\.|0\.0\.0\.0)" || true);
          if [ -n "$matches" ]; then echo "$matches";
          echo "FAIL Non-allowed IP addresses found (only 192.168.x.x permitted)";
          exit 1; fi'
        language: system
        pass_filenames: false
        files: '\.(yaml|sh)$'
