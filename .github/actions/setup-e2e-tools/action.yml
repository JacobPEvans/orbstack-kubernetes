---
name: Setup E2E Tools
description: Install kubectl, kustomize, sops, yq, Python, and Doppler CLI for E2E tests

runs:
  using: composite
  steps:
    - uses: azure/setup-kubectl@v5
      with:
        version: v1.35.2
    - uses: imranismail/setup-kustomize@v2
      with:
        kustomize-version: 5.8.1
    - uses: nhedger/setup-sops@v2
      with:
        version: 3.12.1
    - uses: dcarbone/install-yq-action@v1.3.1
      with:
        version: v4.44.1
    - uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - uses: dopplerhq/cli-action@v4
