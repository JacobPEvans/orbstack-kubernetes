name: AI CI

on:
  workflow_run:
    workflows: ["Validate"]
    types: [completed]

permissions:
  actions: read
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: ai-ci-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  ci-suite:
    uses: JacobPEvans/ai-workflows/.github/workflows/suite-ci.yml@v0.9.1
    with:
      repo_context: "Kubernetes monitoring stack for OrbStack (OTEL, Cribl Edge, Cribl Stream, Helm charts)"
      ci_structure: "validate.yml (Kubernetes manifest validation and linting)"
      workflow_name: "Validate"
    secrets: inherit
