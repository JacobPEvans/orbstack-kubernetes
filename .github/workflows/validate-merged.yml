name: Validate Merged

on:
  push:
    branches: [main]
    paths: ['k8s/**', 'scripts/**']

permissions:
  contents: read

jobs:
  validate-current-and-recent:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ref:
          - main
          - main~1
          - main~2
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ matrix.ref }}
          fetch-depth: 3

      - name: Install kubeconform
        uses: bmuschko/setup-kubeconform@v1

      - name: Validate
        env:
          COMMIT_REF: ${{ matrix.ref }}
        run: |
          echo "=== Validating commit: $(git log --oneline -1) ==="
          kubectl kustomize k8s/monitoring/ > /tmp/rendered-monitoring.yaml
          kubeconform -strict -summary -output text /tmp/rendered-monitoring.yaml
          kubectl kustomize k8s/sandbox/ > /tmp/rendered-sandbox.yaml
          kubeconform -strict -summary -output text /tmp/rendered-sandbox.yaml
