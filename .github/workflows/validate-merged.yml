name: Validate Merged

on:
  push:
    branches: [main]
    paths: ['k8s/**', 'scripts/**']

permissions:
  contents: read

jobs:
  resolve-commits:
    runs-on: ubuntu-latest
    outputs:
      commits: ${{ steps.get-commits.outputs.commits }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 3
      - id: get-commits
        run: |
          commits=$(git log --format='%H' -3 | jq -R -c -s 'split("\n") | map(select(length > 0))')
          echo "commits=$commits" >> "$GITHUB_OUTPUT"

  validate-current-and-recent:
    needs: resolve-commits
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sha: ${{ fromJson(needs.resolve-commits.outputs.commits) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ matrix.sha }}
          fetch-depth: 1

      - name: Install kubeconform
        uses: bmuschko/setup-kubeconform@v1

      - name: Validate
        run: |
          echo "=== Validating commit: $(git log --oneline -1) ==="
          kubectl kustomize k8s/monitoring/ > /tmp/rendered-monitoring.yaml
          kubeconform -strict -summary -output text /tmp/rendered-monitoring.yaml
