---
# cspell:words dorny
# CI Gate - Conditional Required Checks
#
# FRAMEWORK: Merge Gatekeeper Pattern
# ====================================
# Solves: "Required checks that only run when relevant files change"
#
# Problem: GitHub branch protection only supports "always required" or "not required"
#          Path-filtered workflows that don't run = pending forever = blocks merge
#
# Solution: Single workflow that:
# 1. Always triggers on ALL PRs (no path filters at workflow level)
# 2. Detects which file categories changed
# 3. Runs jobs conditionally (skipped = success)
# 4. Final "Merge Gate" job aggregates all results
#
# Branch Protection: Set ONLY "Merge Gate" as required check
#
# Adding New Checks:
# 1. Add filter pattern under `changes.steps.filter.with.filters`
# 2. Add inline job with appropriate `if:` condition
# 3. Add job name to `gate.needs` array and `allowed-skips`

name: CI Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ==========================================================================
  # CHANGE DETECTION
  # ==========================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      validate: ${{ steps.filter.outputs.validate }}
      e2e: ${{ steps.filter.outputs.e2e }}
      is-release-please: ${{ steps.release-please.outputs.result }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            validate:
              - 'k8s/**'
              - 'scripts/**'
              - 'docker/**'
              - 'Makefile'
              - '.pre-commit-config.yaml'
              - '.yamllint.yml'
              - 'tests/**'
              - 'pyproject.toml'
            e2e:
              - 'k8s/**'
              - 'scripts/**'
              - 'Makefile'
              - 'tests/**'
      - name: Detect release-please PR
        id: release-please
        env:
          HEAD_REF: ${{ github.head_ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [[ "$HEAD_REF" == release-please--branches--* && "$PR_AUTHOR" == "github-actions[bot]" ]]; then
            echo "result=true" >> $GITHUB_OUTPUT
          else
            echo "result=false" >> $GITHUB_OUTPUT
          fi

  # ==========================================================================
  # CONDITIONAL CHECKS (inline jobs)
  # ==========================================================================
  validate:
    name: Validate (kubeconform + yamllint)
    needs: changes
    if: needs.changes.outputs.validate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install kubeconform
        uses: bmuschko/setup-kubeconform@v1
      - name: Kustomize build
        run: |
          kubectl kustomize k8s/monitoring/ > /tmp/rendered-monitoring.yaml
          kubectl kustomize k8s/sandbox/ > /tmp/rendered-sandbox.yaml
      - name: Validate Kubernetes schemas
        run: |
          kubeconform -strict -summary -output text /tmp/rendered-monitoring.yaml
          kubeconform -strict -summary -output text /tmp/rendered-sandbox.yaml
      - name: Lint YAML
        run: |
          pip install yamllint
          yamllint k8s/monitoring/
          yamllint k8s/sandbox/

  pre-commit:
    name: Pre-commit
    needs: changes
    if: needs.changes.outputs.validate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install kubeconform
        uses: bmuschko/setup-kubeconform@v1
      - uses: pre-commit/action@v3.0.1

  unit-tests:
    name: Unit tests (no cluster required)
    needs: changes
    if: needs.changes.outputs.validate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install test dependencies
        run: make test-setup
      - name: Run unit tests
        run: make test-unit

  scan-dockerfiles:
    name: Scan Dockerfiles for vulnerabilities
    needs: changes
    if: needs.changes.outputs.validate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Scan claude-code Dockerfile
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: docker/claude-code/
          severity: HIGH,CRITICAL
          exit-code: '1'
      - name: Scan gemini-cli Dockerfile
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: docker/gemini-cli/
          severity: HIGH,CRITICAL
          exit-code: '1'

  test-deps:
    name: Verify test dependencies
    needs: changes
    if: needs.changes.outputs.validate == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install test dependencies
        run: pip install -r tests/requirements.txt
      - name: Verify imports
        run: |
          python -c "
          from opentelemetry.sdk.trace import TracerProvider
          from opentelemetry.exporter.otlp.proto.grpc.trace_exporter import OTLPSpanExporter
          from opentelemetry.exporter.otlp.proto.http.trace_exporter import OTLPSpanExporter
          import pytest
          print('OK')
          "

  e2e:
    name: Deploy and run E2E tests
    needs: changes
    if: needs.changes.outputs.e2e == 'true' && needs.changes.outputs.is-release-please != 'true'
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.35.2
      - uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.8.1
      - uses: nhedger/setup-sops@v2
        with:
          version: 3.12.1
      - uses: dcarbone/install-yq-action@v1.3.1
        with:
          version: v4.44.1
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3
      - name: Install test dependencies
        run: make test-setup
      - name: Mask secrets
        uses: JacobPEvans/.github/actions/mask-secrets@main
        with:
          sops-file: secrets.enc.yaml
      - name: Deploy to OrbStack
        run: make deploy-doppler
      - name: Mask cluster IPs
        uses: JacobPEvans/.github/actions/mask-secrets@main
        with:
          mask-pod-ips: 'true'
          kubernetes-namespace: monitoring
          kubernetes-context: orbstack
      - name: Verify pipeline delivers to Splunk
        run: make warmup-e2e
      - name: Run E2E test suite
        run: make test-e2e

  # ==========================================================================
  # MERGE GATE - The ONLY required check in branch protection
  # ==========================================================================
  gate:
    name: Merge Gate
    needs: [changes, validate, pre-commit, unit-tests, scan-dockerfiles, test-deps, e2e]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check all results
        uses: re-actors/alls-green@release/v1
        with:
          allowed-skips: validate, pre-commit, unit-tests, scan-dockerfiles, test-deps, e2e
          jobs: ${{ toJSON(needs) }}
