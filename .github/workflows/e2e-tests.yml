name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'k8s/**'
      - 'scripts/**'
      - 'Makefile'
      - 'tests/**'

permissions:
  contents: read

jobs:
  e2e:
    name: Deploy and run E2E tests
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v6
      - name: Install test dependencies
        run: make test-setup
      - name: Deploy to OrbStack
        run: make deploy-doppler
      - name: Run E2E test suite
        run: make test-e2e
