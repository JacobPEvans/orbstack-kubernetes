---
name: E2E Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Deploy and run E2E tests
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v6
      - name: Install test dependencies
        run: make test-setup
      - name: Mask secrets
        uses: JacobPEvans/.github/actions/mask-secrets@main
        with:
          sops-file: secrets.enc.yaml
      - name: Deploy to OrbStack
        run: make deploy-doppler
      - name: Mask cluster IPs
        uses: JacobPEvans/.github/actions/mask-secrets@main
        with:
          mask-pod-ips: 'true'
          kubernetes-namespace: monitoring
          kubernetes-context: orbstack
      - name: Verify pipeline delivers to Splunk
        run: make warmup-e2e
      - name: Run E2E test suite
        run: make test-e2e
