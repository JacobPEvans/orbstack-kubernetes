---
name: E2E Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Deploy and run E2E tests
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.35.2
      - uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.8.1
      - uses: nhedger/setup-sops@v2
        with:
          version: 3.12.1
      - uses: dcarbone/install-yq-action@v1.3.1
        with:
          version: v4.44.1
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install test dependencies
        run: make test-setup
      - name: Mask secrets
        uses: JacobPEvans/.github/actions/mask-secrets@main
        with:
          sops-file: secrets.enc.yaml
      - name: Deploy to OrbStack
        run: make deploy-doppler
      - name: Mask cluster IPs
        uses: JacobPEvans/.github/actions/mask-secrets@main
        with:
          mask-pod-ips: 'true'
          kubernetes-namespace: monitoring
          kubernetes-context: orbstack
      - name: Verify pipeline delivers to Splunk
        run: make warmup-e2e
      - name: Run E2E test suite
        run: make test-e2e
