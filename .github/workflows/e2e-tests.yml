---
name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'k8s/**'
      - 'scripts/**'
      - 'Makefile'
      - 'tests/**'
      - '.github/workflows/e2e-tests.yml'

permissions:
  contents: read

jobs:
  e2e:
    name: Deploy and run E2E tests
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v6
      - name: Install test dependencies
        run: make test-setup
      - name: Mask secrets
        uses: JacobPEvans/.github/actions/mask-secrets@main
        with:
          sops-file: secrets.enc.yaml
      - name: Deploy to OrbStack
        run: make deploy-doppler
      - name: Mask cluster IPs
        uses: JacobPEvans/.github/actions/mask-secrets@main
        with:
          mask-pod-ips: 'true'
          kubernetes-namespace: monitoring
          kubernetes-context: orbstack
      - name: Wait for pipeline stabilization
        run: |
          echo "Waiting for OTEL pipeline to stabilize after deploy..."
          # Send a throwaway trace to prime the gRPC connection
          python3 scripts/otel-warmup.py || true
          # Wait for collector to successfully export (confirms gRPC connection is live)
          # "TracesExporter" is the debug exporter log line at normal verbosity confirming a batch was sent
          for i in $(seq 1 12); do
            if kubectl --context orbstack -n monitoring logs statefulset/otel-collector --since=2m 2>/dev/null | grep -q 'TracesExporter'; then
              echo "Pipeline stabilized after $((i * 5))s"
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "WARNING: Pipeline not confirmed stable after 60s, proceeding anyway"
              break
            fi
            sleep 5
          done
      - name: Run E2E test suite
        run: make test-e2e
