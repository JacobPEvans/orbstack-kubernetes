name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'k8s/**'
      - 'scripts/**'
      - 'Makefile'
      - 'tests/**'
      - '.github/workflows/e2e-tests.yml'

permissions:
  contents: read

jobs:
  e2e:
    name: Deploy and run E2E tests
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v6
      - name: Install test dependencies
        run: make test-setup
      - name: Mask secrets
        uses: JacobPEvans/.github/actions/mask-secrets@main
        with:
          sops-file: secrets.enc.yaml
      - name: Deploy to OrbStack
        run: make deploy-doppler
      - name: Mask cluster IPs
        uses: JacobPEvans/.github/actions/mask-secrets@main
        with:
          mask-pod-ips: 'true'
          kubernetes-namespace: monitoring
          kubernetes-context: orbstack
      - name: Wait for pipeline stabilization
        run: |
          echo "Waiting for OTEL pipeline to stabilize after deploy..."
          # Send a throwaway trace to prime the gRPC connection
          python3 -c "
          from opentelemetry.exporter.otlp.proto.grpc.trace_exporter import OTLPSpanExporter
          from opentelemetry.sdk.trace import TracerProvider
          from opentelemetry.sdk.trace.export import SimpleSpanProcessor
          e = OTLPSpanExporter(endpoint='host.internal:30317', insecure=True)
          p = TracerProvider()
          p.add_span_processor(SimpleSpanProcessor(e))
          t = p.get_tracer('warmup')
          with t.start_as_current_span('pipeline-warmup'): pass
          p.shutdown()
          " || true
          # Wait for collector to successfully export (confirms gRPC connection is live)
          for i in $(seq 1 12); do
            if kubectl --context orbstack -n monitoring logs statefulset/otel-collector --since=30s 2>/dev/null | grep -q 'Finished exporting'; then
              echo "Pipeline stabilized after $((i * 5))s"
              break
            fi
            [ "$i" -eq 12 ] && echo "WARNING: Pipeline not confirmed stable after 60s, proceeding anyway"
            sleep 5
          done
      - name: Run E2E test suite
        run: make test-e2e
