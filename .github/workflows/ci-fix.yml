name: CI Fix (Claude)

on:
  workflow_run:
    workflows: ["Validate"]
    types: [completed]

permissions:
  actions: read
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: ci-fix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  fix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main'
    uses: JacobPEvans/ai-workflows/.github/workflows/ci-fix.yml@v0.8.0
    with:
      repo_context: "Kubernetes monitoring stack for OrbStack (OpenTelemetry, Cribl Edge, Cribl Stream)"
      ci_structure: "validate.yml (manifest validation and linting) + validate-merged.yml (post-merge validation)"
    secrets: inherit
