name: Best Practices
on:
  schedule:
    - cron: "0 3 * * 2,5"
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: read

concurrency:
  group: best-practices-${{ github.ref }}
  cancel-in-progress: true

jobs:
  best-practices:
    uses: JacobPEvans/ai-workflows/.github/workflows/best-practices.yml@v0.9.1
    secrets: inherit
