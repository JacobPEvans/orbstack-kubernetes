name: Code Simplifier
on:
  schedule:
    - cron: "0 4 * * 0,3,6"
  workflow_dispatch:
permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: code-simplifier-${{ github.ref }}
  cancel-in-progress: true

jobs:
  simplify:
    uses: JacobPEvans/ai-workflows/.github/workflows/code-simplifier.yml@v0.8.0
    secrets: inherit
